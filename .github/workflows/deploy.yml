name: 部署 Vue 3 到 GitHub Pages

on:
  push:
    branches: ['develop']

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: 安装依赖并构建
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 部署到 gh-pages 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
